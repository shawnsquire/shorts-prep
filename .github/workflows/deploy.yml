name: Deploy to ktn

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.KTN_HOST }}
          username: shawn
          key: ${{ secrets.KTN_SSH_KEY }}
          script: |
            cd /opt/services/shorts-prep
            git pull origin main
            docker compose build
            docker compose up -d
